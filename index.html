<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D House Builder</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #f59e0b;
            --primary-hover: #d97706;
            --text-main: rgba(255, 255, 255, 0.95);
            --ease: cubic-bezier(0.4, 0, 0.2, 1);
            --spring: cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Inter', sans-serif;
            background-color: #000;
            overflow: hidden;
        }

        /* Fullscreen Background */
        .background-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('bob_the_builder.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            z-index: 1;
            /* Subtle zoom animation */
            animation: kenburns 20s ease-out infinite alternate;
        }

        @keyframes kenburns {
            0% { transform: scale(1); }
            100% { transform: scale(1.08); }
        }

        /* Overlay to ensure text readability */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                135deg, 
                rgba(15, 23, 42, 0.8) 0%, 
                rgba(15, 23, 42, 0.45) 100%
            );
            z-index: 2;
        }

        /* Center Content Alignment */
        .content-wrapper {
            position: relative;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            padding: 20px;
        }

        /* Glassmorphism Card */
        .hero-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(24px) saturate(1.2);
            -webkit-backdrop-filter: blur(24px) saturate(1.2);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 32px;
            padding: 60px 48px;
            max-width: 700px;
            text-align: center;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5), 
                        inset 0 1px 0 rgba(255, 255, 255, 0.1);
            
            /* Entrance animation setup */
            opacity: 0;
            transform: translateY(40px);
            animation: slideUpFade 1.2s var(--spring) forwards 0.3s;
        }

        @keyframes slideUpFade {
            0% { opacity: 0; transform: translateY(40px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        /* Typography */
        h1 {
            font-family: 'DM Serif Display', serif;
            font-size: clamp(3rem, 5vw, 4.5rem);
            line-height: 1.1;
            color: var(--text-main);
            margin: 0 0 20px 0;
            text-shadow: 0 4px 12px rgba(0, 0, 0, 0.4);
            letter-spacing: -0.01em;
        }

        p.subtitle {
            font-size: clamp(1.1rem, 2vw, 1.4rem);
            color: rgba(255, 255, 255, 0.75);
            margin: 0 0 48px 0;
            font-weight: 400;
            line-height: 1.6;
            max-width: 540px;
            margin-left: auto;
            margin-right: auto;
        }

        /* Interactive CTA Button */
        .cta-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background: linear-gradient(135deg, var(--primary), var(--primary-hover));
            color: #fff;
            padding: 20px 48px;
            border-radius: 100px;
            font-size: 1.2rem;
            font-weight: 600;
            text-decoration: none;
            letter-spacing: 0.02em;
            box-shadow: 0 12px 24px rgba(245, 158, 11, 0.3);
            transition: all 0.3s var(--spring);
            border: 1px solid rgba(255, 255, 255, 0.2);
            position: relative;
            overflow: hidden;
            opacity: 0;
            animation: fadeIn 0.8s ease forwards 1s;
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        .cta-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.6s ease;
        }

        .cta-button:hover {
            transform: translateY(-4px) scale(1.03);
            box-shadow: 0 20px 40px rgba(245, 158, 11, 0.4);
        }

        .cta-button:hover::before {
            left: 100%;
        }

        .cta-button:active {
            transform: translateY(2px) scale(0.98);
        }

        .btn-icon {
            font-size: 1.4rem;
            transition: transform 0.3s var(--spring);
        }

        .cta-button:hover .btn-icon {
            transform: translateX(6px);
        }

        /* Subtle floating particle background detail */
        .particles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 5;
            pointer-events: none;
        }

        @media (max-width: 768px) {
            .hero-card {
                padding: 40px 24px;
                border-radius: 24px;
                width: 90%;
            }
            .cta-button {
                padding: 16px 36px;
                font-size: 1.1rem;
                width: 100%;
                box-sizing: border-box;
            }
        }
    </style>
</head>
<body>

    <!-- Background Layer -->
    <div class="background-container"></div>
    <div class="overlay"></div>

    <!-- Main Content -->
    <div class="content-wrapper">
        <div class="hero-card">
            <h1>Why Bob the Builder should have all the fun?</h1>
            <p class="subtitle">Experience building your very own interactive 3D home profile in minutes. No hardhat required.</p>
            
            <a href="survey.html" class="cta-button">
                <span>Build your home now</span>
                <span class="btn-icon">→</span>
            </a>
        </div>
    </div>

</body>
</html>
