        // =================================================================
        // CAMERA CONTROL & ANIMATION
        // =================================================================

        function setCameraView(viewName) {
            let view = cameraViews[viewName];

            if (view) {
                targetCameraPos.set(...view.pos);
                targetCameraLookAt.set(...view.lookAt);

                const previousView = currentCameraView;
                currentCameraView = viewName;

                // Update active camera button
                document.querySelectorAll('.camera-btn').forEach(btn => btn.classList.remove('active'));
                const activeBtn = document.querySelector(`.camera-btn[data-view="${viewName}"]`);
                if (activeBtn) activeBtn.classList.add('active');

                // Rebuild house if switching to/from terrace (roof visibility)
                if (viewName === 'terrace' || previousView === 'terrace') {
                    buildHouse();
                }
            }
        }

        function animate() {
            requestAnimationFrame(animate);

            // Smooth camera interpolation
            camera.position.lerp(targetCameraPos, 0.04);
            currentCameraLookAt.lerp(targetCameraLookAt, 0.04);
            camera.lookAt(currentCameraLookAt);

            // Slight camera drift for alive feeling
            const time = Date.now() * 0.0003;
            camera.position.x += Math.sin(time) * 0.002;
            camera.position.y += Math.cos(time * 0.7) * 0.002;

            // Process roof lift/descend animations
            houseGroup.traverse(child => {
                if (child.userData && child.userData.roofAnimating) {
                    child.position.y = THREE.MathUtils.lerp(child.position.y, child.userData.targetY, 0.05);
                    if (child.material && child.material.opacity !== undefined) {
                        child.material.opacity = THREE.MathUtils.lerp(child.material.opacity, child.userData.targetOpacity, 0.05);
                    }
                    // Check if animation is complete
                    if (Math.abs(child.position.y - child.userData.targetY) < 0.05) {
                        child.userData.roofAnimating = false;
                    }
                }
            });

            // Process appliance and people drop-in animations
            appliancesGroup.traverse(child => {
                if (child.userData && child.userData.animateIn) {
                    const targetY = child.userData.targetY || 0;
                    child.position.y = THREE.MathUtils.lerp(child.position.y, targetY, 0.08);
                    const s = THREE.MathUtils.lerp(child.scale.x, 1, 0.08);
                    child.scale.set(s, s, s);
                    // Check if animation is complete
                    if (Math.abs(child.position.y - targetY) < 0.05 && Math.abs(child.scale.x - 1) < 0.05) {
                        child.userData.animateIn = false;
                    }
                }
            });

            // Process partition wall slide-in animations
            houseGroup.traverse(child => {
                if (child.userData && child.userData.animateInX) {
                    const targetX = child.userData.targetX || 0;
                    child.position.x = THREE.MathUtils.lerp(child.position.x, targetX, 0.08);
                    // Check if animation is complete
                    if (Math.abs(child.position.x - targetX) < 0.05) {
                        child.userData.animateInX = false;
                    }
                }
            });

            renderer.render(scene, camera);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function buildQuestionHTML(question) {
            const currentIdx = surveyState.currentQuestionIndex;
            const total = surveyQuestions.length;
            let html = buildProgressHTML(currentIdx, total);

            html += `
                <div class="question-topic">${question.topic.toUpperCase()}</div>
                <div class="question-text">${question.text}</div>
            `;

            if (question.type === 'NUMBER') {
                const currentVal = parseInt(surveyState.answers[question.id]) || 1500;
                const minVal = question.min || 100;
                const maxVal = question.max || 9999;
                const stepVal = question.step || 50;
                html += `
                    <div class="number-stepper">
                        <button class="stepper-btn" id="stepperMinus" ${currentVal <= minVal ? 'disabled' : ''}>−</button>
                        <div>
                            <div class="stepper-value" id="stepperValue">${currentVal.toLocaleString()}</div>
                            <div class="stepper-unit">${question.unit || 'sq ft'}</div>
                        </div>
                        <button class="stepper-btn" id="stepperPlus" ${currentVal >= maxVal ? 'disabled' : ''}>+</button>
                    </div>
                    <input type="hidden" id="numberInput" value="${currentVal}">
                `;
            } else {
                if (question.type === 'MULTIPLE') {
                    const currentAnswers = surveyState.answers[question.id] || [];
                    const dismissed = currentAnswers.length > 0;
                    html += `<div class="multi-select-hint${dismissed ? ' dismissed' : ''}">◻ Select multiple</div>`;
                }

                const colClass = question.choices.length <= 2 ? 'cols-1' : 'cols-2';
                html += `<div class="choices-container ${colClass}">`;
                question.choices.forEach((choice) => {
                    const isSelected = Array.isArray(surveyState.answers[question.id])
                        ? surveyState.answers[question.id].includes(choice.value)
                        : surveyState.answers[question.id] === choice.value;

                    const selectedClass = question.type === 'MULTIPLE' && isSelected ? 'selected-multi' :
                                        isSelected ? 'selected' : '';
                    const checkMark = question.type === 'MULTIPLE'
                        ? `<span class="choice-check">✓</span>` : '';

                    const iconHtml = choice.icon ? `<span class="choice-icon">${choice.icon}</span>` : '';
                    const descHtml = choice.desc ? `<span class="choice-desc">${choice.desc}</span>` : '';
                    html += `
                        <button class="choice-btn ${selectedClass}"
                                onclick="selectAnswer('${question.id}', '${choice.value}', '${question.type}')">
                            ${checkMark}${iconHtml}
                            <div class="choice-text-wrap">
                                <span class="choice-title">${choice.text}</span>
                                ${descHtml}
                            </div>
                        </button>
                    `;
                });
                html += `</div>`;
            }

            html += `
                <div class="nav-buttons">
                    <button class="btn btn-secondary" onclick="previousQuestion()"
                            ${currentIdx === 0 ? 'disabled' : ''}>
                        ← Previous
                    </button>
                    <button class="btn btn-primary" id="nextBtn" onclick="nextQuestion()">
                        ${currentIdx === total - 1 ? 'Complete Survey' : 'Next →'}
                    </button>
                </div>
            `;
            return html;
        }

        function renderQuestion(direction) {
            const question = surveyQuestions[surveyState.currentQuestionIndex];
            const container = document.getElementById('questionContainer');

            // Update room label
            updateRoomLabel(question.roomLabel);

            // Set camera view
            setCameraView(question.topic);

            // Keep legacy progress bar IDs working (hidden via CSS, but don't crash)
            const progress = ((surveyState.currentQuestionIndex + 1) / surveyQuestions.length) * 100;
            const pb = document.getElementById('progressBar');
            const pt = document.getElementById('progressText');
            if (pb) pb.style.width = progress + '%';
            if (pt) pt.textContent = `Q${surveyState.currentQuestionIndex + 1} of ${surveyQuestions.length}`;

            // Gamification: Show Mascot tooltip (only on question transitions, not in-place re-renders)
            const speech = document.getElementById('mascotSpeech');
            const mascotObj = document.getElementById('mascotImage');
            if (speech && mascotObj) {
                mascotObj.classList.add('visible');
                if (direction !== null) {
                    // Only reset speech bubble on actual question transitions
                    speech.classList.remove('visible');
                    setTimeout(() => {
                        speech.textContent = question.tooltip || "Let's keep going!";
                        speech.classList.add('visible');
                    }, 300);
                }
            }

            const inject = () => {
                const enterClass = direction === 'back' ? 'entering-back' : 'entering';
                container.innerHTML = `<div class="question-content ${direction ? enterClass : ''}">${buildQuestionHTML(question)}</div>`;
                const content = container.querySelector('.question-content');

                // Wire stepper if NUMBER question
                if (question.type === 'NUMBER') {
                    let val = parseInt(document.getElementById('numberInput').value) || 1500;
                    const minVal = question.min || 100;
                    const maxVal = question.max || 9999;
                    const stepVal = question.step || 50;

                    const valEl = document.getElementById('stepperValue');
                    const minusBtn = document.getElementById('stepperMinus');
                    const plusBtn = document.getElementById('stepperPlus');

                    const update = (dir) => {
                        val = dir === '+' ? Math.min(val + stepVal, maxVal) : Math.max(val - stepVal, minVal);
                        valEl.classList.remove('tick-up', 'tick-down');
                        void valEl.offsetWidth;
                        valEl.classList.add(dir === '+' ? 'tick-up' : 'tick-down');
                        valEl.textContent = val.toLocaleString();
                        document.getElementById('numberInput').value = val;
                        surveyState.answers[question.id] = String(val);
                        surveyState.livingArea = val;
                        minusBtn.disabled = val <= minVal;
                        plusBtn.disabled = val >= maxVal;
                    };

                    minusBtn.addEventListener('click', () => update('-'));
                    plusBtn.addEventListener('click', () => update('+'));
                    // Set initial answer if not set
                    if (!surveyState.answers[question.id]) {
                        surveyState.answers[question.id] = String(val);
                        surveyState.livingArea = val;
                    }
                }

                // Animate in
                if (direction && content) {
                    requestAnimationFrame(() => {
                        content.classList.remove('entering', 'entering-back');
                    });
                }
            };

            if (direction) {
                const existing = container.querySelector('.question-content');
                if (existing) {
                    existing.classList.add(direction === 'back' ? 'exiting-back' : 'exiting');
                    setTimeout(inject, 180);
                    return;
                }
            }
            inject();
        }

        function updateRoomLabel(roomLabel) {
            const label = document.getElementById('roomLabel');
            label.querySelector('.room-emoji').textContent = roomLabel.emoji;
            label.querySelector('.room-name').textContent = roomLabel.name;

            // Animate in
            label.classList.remove('visible');

        function selectAnswer(questionId, value, type) {
            console.log('\n👆 USER SELECTED:');
            console.log('   Question:', questionId);
            console.log('   Answer:', value);
            console.log('   Type:', type);

            if (type === 'MULTIPLE') {
                if (!surveyState.answers[questionId]) {
                    surveyState.answers[questionId] = [];
                }

                const index = surveyState.answers[questionId].indexOf(value);
                if (index > -1) {
                    surveyState.answers[questionId].splice(index, 1);
                    console.log('   Action: DESELECTED');
                } else {
                    // Handle 'none' selection
                    if (value === 'none') {
                        surveyState.answers[questionId] = ['none'];
                    } else {
                        surveyState.answers[questionId] = surveyState.answers[questionId].filter(v => v !== 'none');
                        surveyState.answers[questionId].push(value);
                    }
                    console.log('   Action: SELECTED');
                }
                console.log('   Current selections:', surveyState.answers[questionId].join(', '));
            } else {
                surveyState.answers[questionId] = value;
                console.log('   Action: SET');
            }

            // Update special state
            if (questionId === 'Q1') {
                surveyState.dwellingType = value;
                console.log('   ➜ Dwelling type set to:', value);
            }

            // Humorous Gamification Feedback
            if (humorousFeedback[questionId] && humorousFeedback[questionId][value]) {
                showMascotFeedback(humorousFeedback[questionId][value]);
            } else {
                // Generic positive reinforcement if no specific humorous feedback
                const generic = [
                    "Nice choice! You're making progress! 🚀",
                    "Wow! You're an energy expert in the making! 🎓",
                    "I love that answer! Let's keep going! ✨",
                    "Great! Your energy profile is looking sharper than my hammer! 🔨"
                ];
                showMascotFeedback(generic[Math.floor(Math.random() * generic.length)]);
            }
            if (questionId === 'Q4') {
                // Handle bedroom count including "4+" option
                if (value === '4') {
                    surveyState.bedrooms = 4;
                } else {
                    surveyState.bedrooms = parseInt(value) || 2;
                }
                console.log('   ➜ Bedrooms set to:', surveyState.bedrooms);
            }
            if (questionId === 'Q5') {
                // Handle occupants including "5+" option
                if (value === '5') {
                    surveyState.occupants = 5;
                } else {
                    surveyState.occupants = parseInt(value) || 2;

                console.log('   ➜ Occupants set to:', surveyState.occupants);

                surveyState.livingArea = parseInt(value) || 1500;

        async function nextQuestion() {
            const question = surveyQuestions[surveyState.currentQuestionIndex];

            // Validate answer
            if (!surveyState.answers[question.id] ||
                (Array.isArray(surveyState.answers[question.id]) && surveyState.answers[question.id].length === 0)) {
                alert('Please answer the question before continuing.');
                return;
            }

            // Send answer to API
            await submitAnswerToAPI(question);

            if (surveyState.currentQuestionIndex < surveyQuestions.length - 1) {
                surveyState.currentQuestionIndex++;
                // Reveal camera controls after Q3 (when rooms start being built)
                const controls = document.getElementById('cameraControls');
                if (controls && surveyState.currentQuestionIndex >= 3) {
                    controls.classList.add('visible');
                }
                renderQuestion('forward');
                // Update 3D scene with new appliances/people based on current answers
                updateScene();
            } else {
                completeSurvey();
            }
        }

        function previousQuestion() {
            if (surveyState.currentQuestionIndex > 0) {
                surveyState.currentQuestionIndex--;
                // Hide camera controls if going back before Q3
                const controls = document.getElementById('cameraControls');
                if (controls && surveyState.currentQuestionIndex < 3) {
                    controls.classList.remove('visible');
                }
                renderQuestion('back');
                // Update 3D scene to reflect previous question state
                updateScene();
            }
        }

        // =================================================================
        // API INTEGRATION
        // =================================================================

        async function submitAnswerToAPI(question) {
            const answer = surveyState.answers[question.id];
            const apiUrl = `${API_CONFIG.baseUrl}/users/${API_CONFIG.userId}/homes/${API_CONFIG.premiseOrdinal}/survey/user_id?access_token=${API_CONFIG.accessToken}`;

            const surveyData = {
                surveyId: "defaultSurvey",
                questionId: question.id,
                answer: answer,
                stateMapper: question.stateMapper
            };

            try {
                const response = await fetch(apiUrl, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(surveyData)
                });

                if (!response.ok) {
                    console.warn('API call failed:', response.statusText);
                }
            } catch (error) {
                console.error('API error:', error);
                // Continue anyway for demo purposes
            }
        }

        function completeSurvey() {
            document.getElementById('surveyPanel').classList.add('hidden');
            document.getElementById('roomLabel').classList.remove('visible');
            document.getElementById('cameraControls').classList.add('visible');

            // Set overview camera
            setCameraView('overview');

            // Show completion screen

                const completionScreen = document.getElementById('completionScreen');
                completionScreen.classList.add('visible');

                // Generate summary badges
                const badgesContainer = document.getElementById('summaryBadges');
                let html = '';

                // Core Stats
                html += `<div class="badge">🏠 ${surveyState.answers.Q1 || 'Home'}</div>`;
                html += `<div class="badge">🛏️ ${surveyState.bedrooms} Beds</div>`;
                
                // GAMIFICATION: Eco-Badges Logic
                const isSolar = surveyState.answers.Q12 === 'yes';
                const isEV = surveyState.answers.Q13 === 'yes';
                const hasHeatPump = surveyState.answers.Q6 && surveyState.answers.Q6.includes('heatPump');
                const hasSmartThermostat = surveyState.answers.Q9 === 'yes';

                if (isSolar) {
                    html += `<div class="badge gold">☀️ Sun Catcher</div>`;
                }
                if (isEV) {
                    html += `<div class="badge gold">🚗 Future Driver</div>`;
                }
                if (hasHeatPump) {
                    html += `<div class="badge gold">⚡ Electrified Heat</div>`;
                }
                if (hasSmartThermostat) {
                    html += `<div class="badge gold">📱 Tech Wizard</div>`;
                }
                if (surveyState.answers.Q14 === 'yes') {
                    html += `<div class="badge">🏊 Pool</div>`;
                }

                badgesContainer.innerHTML = html;

                // Dismiss overlay to expose 3D house
                document.getElementById('completionDismiss').addEventListener('click', () => {
                    completionScreen.style.transition = 'opacity 0.5s ease';
                    completionScreen.style.opacity = '0';
                    setTimeout(() => {
                        completionScreen.classList.remove('visible');
                        completionScreen.style.opacity = '';
                        completionScreen.style.transition = '';
                    }, 500);
                });
            }, 1000);
        }

        function restartSurvey() {
            surveyState.currentQuestionIndex = 0;
            surveyState.answers = {};
            surveyState.bedrooms = 2;
            surveyState.floors = 1;
            surveyState.occupants = 2;
            surveyState.livingArea = 1500;

            document.getElementById('completionScreen').classList.remove('visible');
            document.getElementById('surveyPanel').classList.remove('hidden');
            document.getElementById('cameraControls').classList.remove('visible');

            updateScene();
            renderQuestion();
        }

        // Showcase Complete House - Animated Camera Tour
        let showcaseTourActive = false;
        let showcaseTourStep = 0;
        let showcaseTourInterval = null;

        function showcaseCompleteHouse() {
            // Close completion screen but keep it hidden
            document.getElementById('completionScreen').classList.remove('visible');

            // Start automated camera tour
            showcaseTourActive = true;
            showcaseTourStep = 0;

            // Camera tour sequence - shows all major features
            const tourSequence = [
                { view: 'overview', duration: 3000, label: '🏠 Overview - Your Complete Home' },
                { view: 'front', duration: 2500, label: '🚪 Front Entrance' },
                { view: 'bedroom', duration: 2500, label: '🛏️ Bedrooms' },
                { view: 'bathroom', duration: 2500, label: '🚿 Bathroom' },
                { view: 'kitchen', duration: 2500, label: '🍳 Kitchen' },
                { view: 'livinghall', duration: 2500, label: '🛋️ Living Hall' },
                { view: 'side', duration: 2000, label: '🏡 Side View' },
                { view: 'top', duration: 3000, label: '⬆️ Bird\'s Eye View' },
                { view: 'overview', duration: 2000, label: '✅ Complete!' }
            ];

            // Show tour label
            const roomLabel = document.getElementById('roomLabel');
            const roomName = document.querySelector('.room-name');

            function runTourStep() {
                if (!showcaseTourActive || showcaseTourStep >= tourSequence.length) {
                    showcaseTourActive = false;
                    clearInterval(showcaseTourInterval);

                    // Show completion screen again
                    setTimeout(() => {
                        document.getElementById('completionScreen').classList.add('visible');
                    }, 1000);
                    return;
                }

                const step = tourSequence[showcaseTourStep];

                // Update camera
                setCameraView(step.view);

                // Update label
                roomName.textContent = step.label;
                roomLabel.classList.add('visible');

                // Move to next step
                showcaseTourStep++;

                // Schedule next step
                setTimeout(runTourStep, step.duration);
            }

            // Start tour
            runTourStep();
        }

        // Add secondary button style
        const style = document.createElement('style');
        style.textContent = `
            .btn-secondary {
                background: rgba(255, 255, 255, 0.05);
                border: 2px solid rgba(255, 255, 255, 0.2);
                color: rgba(255, 255, 255, 0.8);
            }
            .btn-secondary:hover {
                background: rgba(255, 255, 255, 0.1);
                border-color: rgba(255, 255, 255, 0.4);
            }
        `;
        document.head.appendChild(style);

        // =================================================================
        // INITIALIZATION
        // =================================================================

        window.onload = function() {
            initScene();
            renderQuestion();
        };
    </script>
