 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>🏠 3D House Survey - Interactive Home Profile v2.2-FIXED</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://unpkg.com/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <style>
        :root {
            --bg-deep: #0a0e1a;
            --bg-glass: rgba(10, 14, 26, 0.84);
            --accent: #60a5fa;
            --accent-dim: rgba(96, 165, 250, 0.14);
            --accent-glow: rgba(96, 165, 250, 0.3);
            --success: #10b981;
            --border-subtle: rgba(255, 255, 255, 0.1);
            --border-accent: rgba(96, 165, 250, 0.25);
            --text-primary: rgba(255, 255, 255, 0.92);
            --text-dim: rgba(255, 255, 255, 0.5);
            --radius-card: 24px;
            --spring: cubic-bezier(0.34, 1.56, 0.64, 1);
            --ease: cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }


        body {
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            background: #0a0e1a;
            color: white;
        }

        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* Room Label — top of canvas area (right of sidebar) */
        .room-label {
            position: fixed;
            top: 20px;
            left: 380px; /* sidebar width + gap */
            right: unset;
            transform: none;
            background: rgba(10, 14, 26, 0.7);
            backdrop-filter: blur(12px);
            padding: 7px 16px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 13px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.8);
            z-index: 100;
            display: flex;
            align-items: center;
            gap: 7px;
            transition: opacity 0.5s var(--ease);
            opacity: 0;
        }

        .room-label.visible {
            opacity: 1;
        }

        .room-emoji {
            font-size: 16px;
        }

        /* Survey Panel — left sidebar */
        .survey-panel {
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
            width: 360px;
            max-height: 100vh;
            background: var(--bg-glass);
            backdrop-filter: blur(40px) saturate(1.4);
            -webkit-backdrop-filter: blur(40px) saturate(1.4);
            padding: 28px 28px 24px;
            overflow-y: auto;
            overflow-x: hidden;
            scrollbar-width: thin;
            scrollbar-color: rgba(96, 165, 250, 0.2) transparent;
            z-index: 10;
            border-radius: 0;
            border: none;
            border-right: 1px solid var(--border-subtle);
            box-shadow: 4px 0 40px rgba(0, 0, 0, 0.4);
            transition: opacity 0.35s var(--ease), transform 0.35s var(--ease);
            display: flex;
            flex-direction: column;
        }

        /* Sidebar header — logo / app name */
        .survey-panel::before {
            content: '🏠 Home Profile';
            display: block;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: var(--text-dim);
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.07);
            flex-shrink: 0;
        }

        .survey-panel.hidden {
            opacity: 0;
            transform: translateX(-100%);
            pointer-events: none;
        }

        /* Progress dots row */
        .progress-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 22px;
            padding-bottom: 18px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.07);
        }

        .progress-track {
            flex: 1;
            height: 4px;
            border-radius: 4px;
            background: rgba(255, 255, 255, 0.08);
            overflow: hidden;
            position: relative;
        }

        .progress-fill {
            height: 100%;
            border-radius: 4px;
            background: linear-gradient(90deg, var(--accent), #818cf8);
            box-shadow: 0 0 10px var(--accent-glow);
            transition: width 0.4s var(--spring);
        }

        .progress-counter {
            font-size: 11px;
            color: var(--text-dim);
            font-weight: 500;
            letter-spacing: 0.04em;
            flex-shrink: 0;
            white-space: nowrap;
        }

        /* Keep old IDs functional but hidden (JS still sets width/text) */
        #progressBar { display: none; }
        #progressText { display: none; }

        .question-container {
            width: 100%;
            flex: 1;
        }

        .question-topic {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #60a5fa;
            margin-bottom: 6px;  /* REDUCED from 12px */
            font-weight: 600;
        }

        .question-text {
            font-family: 'DM Serif Display', serif;
            font-size: 20px;
            line-height: 1.35;
            color: white;
            margin-bottom: 14px;
        }

        .question-hint {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 12px;  /* REDUCED from 20px */
            font-style: italic;
        }

        .choices-container {
            display: grid;
            gap: 10px;
            margin-bottom: 15px;
        }

        .choices-container.cols-1 { grid-template-columns: 1fr; }
        .choices-container.cols-2 { grid-template-columns: 1fr 1fr; }

        .choice-btn {
            background: rgba(255, 255, 255, 0.04);
            border: 1.5px solid var(--border-subtle);
            padding: 14px 16px;
            border-radius: 14px;
            color: var(--text-primary);
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s var(--ease);
            font-weight: 500;
            position: relative;
            overflow: hidden;
            text-align: left;
            display: flex;
            align-items: center;
            gap: 12px;
            min-height: 56px;
        }

        .choice-icon {
            font-size: 26px;
            line-height: 1;
            flex-shrink: 0;
            width: 36px;
            text-align: center;
        }

        .choice-text-wrap {
            display: flex;
            flex-direction: column;
            gap: 2px;
            min-width: 0;
        }

        .choice-title {
            font-size: 14px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.92);
            line-height: 1.3;
        }

        .choice-desc {
            font-size: 11.5px;
            font-weight: 400;
            color: rgba(255, 255, 255, 0.42);
            line-height: 1.35;
            letter-spacing: 0.01em;
        }

        .choice-btn:hover .choice-desc {
            color: rgba(255, 255, 255, 0.55);
        }

        .choice-btn.selected .choice-title,
        .choice-btn.selected-multi .choice-title {
            color: #fff;
        }

        .choice-btn.selected .choice-desc,
        .choice-btn.selected-multi .choice-desc {
            color: rgba(255, 255, 255, 0.6);
        }

        .choice-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(96, 165, 250, 0.08), transparent);
            transition: left 0.45s ease;
        }

        .choice-btn:hover {
            border-color: rgba(96, 165, 250, 0.45);
            background: rgba(96, 165, 250, 0.07);
            transform: translateY(-1px);
            color: white;
        }

        .choice-btn:hover::before {
            left: 100%;
        }

        /* Unified selected state for both single and multi */
        .choice-btn.selected,
        .choice-btn.selected-multi {
            border-color: var(--accent);
            border-left-width: 3px;
            background: var(--accent-dim);
            color: white;
        }

        /* Checkmark for multi-select */
        .choice-btn.selected-multi .choice-check {
            color: var(--accent);
            font-size: 13px;
            font-weight: 700;
            flex-shrink: 0;
        }

        .choice-check {
            opacity: 0;
            width: 0;
            overflow: hidden;
            transition: all 0.2s ease;
        }

        .choice-btn.selected-multi .choice-check {
            opacity: 1;
            width: auto;
        }

        /* Number stepper */
        .number-stepper {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 28px;
            margin: 18px auto 20px;
        }

        .stepper-btn {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            border: 1.5px solid var(--border-accent);
            background: var(--accent-dim);
            color: var(--accent);
            font-size: 26px;
            line-height: 1;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.18s var(--spring);
            -webkit-tap-highlight-color: transparent;
            flex-shrink: 0;
        }

        .stepper-btn:hover:not(:disabled) {
            background: rgba(96, 165, 250, 0.22);
            transform: scale(1.08);
        }

        .stepper-btn:active:not(:disabled) {
            transform: scale(0.94);
        }

        .stepper-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .stepper-value {
            font-family: 'DM Serif Display', serif;
            font-size: 52px;
            color: white;
            min-width: 120px;
            text-align: center;
            line-height: 1;
        }

        .stepper-unit {
            font-size: 13px;
            color: var(--text-dim);
            text-align: center;
            margin-top: -6px;
            font-family: 'Inter', sans-serif;
        }

        @keyframes tick-up {
            0% { transform: translateY(10px); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }

        @keyframes tick-down {
            0% { transform: translateY(-10px); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }

        .stepper-value.tick-up { animation: tick-up 0.18s ease; }
        .stepper-value.tick-down { animation: tick-down 0.18s ease; }

        /* Keep old class for fallback */
        .number-input {
            background: rgba(255, 255, 255, 0.06);
            border: 2px solid rgba(255, 255, 255, 0.12);
            padding: 18px 24px;
            border-radius: 16px;
            color: white;
            font-size: 18px;
            width: 200px;
            font-weight: 500;
        }

        .number-input:focus {
            outline: none;
            border-color: #60a5fa;
            background: rgba(96, 165, 250, 0.08);
        }

        .nav-buttons {
            display: flex;
            gap: 12px;  /* REDUCED from 15px */
            margin-top: 15px;  /* REDUCED from 30px */
        }

        .btn {
            padding: 12px 24px;  /* REDUCED from 16px 32px */
            border-radius: 10px;
            font-size: 15px;  /* Slightly smaller */
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: none;
        }

        .btn-primary {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            flex: 1;
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(16, 185, 129, 0.4);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.08);
            color: white;
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.12);
        }

        .btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        /* Completion Screen — light overlay so 3D house shows through */
        .completion-screen {
            position: fixed;
            top: 0;
            left: 360px; /* sit over canvas area only, not sidebar */
            right: 0;
            bottom: 0;
            background: rgba(10, 14, 26, 0.55);
            backdrop-filter: blur(8px) saturate(1.2);
            -webkit-backdrop-filter: blur(8px) saturate(1.2);
            z-index: 1000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 40px;
            transition: opacity 0.5s ease;
        }

        .completion-screen.visible {
            display: flex;
        }

        /* Tight glass card holding the summary */
        .completion-card {
            background: rgba(10, 14, 26, 0.9);
            border: 1px solid var(--border-accent);
            border-radius: var(--radius-card);
            padding: 44px 48px;
            width: clamp(300px, 46vw, 560px);
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.55);
            text-align: center;
        }

        .completion-content {
            text-align: center;
            max-width: 800px;
        }

        .completion-emoji {
            font-size: 120px;
            margin-bottom: 20px;
            animation: bounce 2s ease-in-out infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        .completion-title {
            font-family: 'DM Serif Display', serif;
            font-size: 56px;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #10b981, #60a5fa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .completion-subtitle {
            font-size: 20px;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 40px;
        }

        .summary-badges {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            margin-bottom: 40px;
        }

        .badge {
            background: rgba(96, 165, 250, 0.12);
            border: 1px solid rgba(96, 165, 250, 0.3);
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 14px;
            color: #60a5fa;
            font-weight: 500;
        }

        /* Smoke animation */
        @keyframes smoke-rise {
            0% {
                opacity: 0.8;
                transform: translateY(0) scale(1);
            }
            100% {
                opacity: 0;
                transform: translateY(-50px) scale(1.5);
            }
        }

        .smoke-particle {
            position: absolute;
            width: 10px;
            height: 10px;
            background: rgba(200, 200, 200, 0.6);
            border-radius: 50%;
            animation: smoke-rise 3s ease-out infinite;
        }

        /* Loading overlay */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #0a0e1a;
            z-index: 10000;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 20px;
            transition: opacity 0.5s ease;
        }

        .loading-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .loading-text {
            font-size: 24px;
            color: rgba(255, 255, 255, 0.8);
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top-color: #60a5fa;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Camera view controls — vertical stack on right edge */
        .camera-controls {
            position: fixed;
            right: 20px;
            top: 50%;
            transform: translateY(-50%) translateX(70px);
            display: flex;
            flex-direction: column;
            gap: 6px;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s var(--ease), transform 0.4s var(--spring);
        }

        .camera-controls.visible {
            opacity: 1;
            pointer-events: auto;
            transform: translateY(-50%) translateX(0);
        }

        .camera-btn {
            padding: 8px 14px;
            background: rgba(10, 14, 26, 0.78);
            color: rgba(255, 255, 255, 0.65);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.03em;
            white-space: nowrap;
            backdrop-filter: blur(12px);
            transition: all 0.2s var(--ease);
        }

        .camera-btn:hover {
            background: var(--accent-dim);
            border-color: rgba(96, 165, 250, 0.4);
            color: white;
            transform: translateX(-2px);
        }

        .camera-btn.active {
            background: var(--accent-dim);
            border-color: var(--accent);
            color: white;
            box-shadow: 0 0 12px var(--accent-glow),
                        inset 0 1px 0 rgba(255, 255, 255, 0.1);
        }
        /* Question transition wrapper */
        .question-content {
            transition: transform 0.26s var(--spring), opacity 0.2s ease;
            will-change: transform, opacity;
        }

        .question-content.exiting {
            transform: translateX(-28px);
            opacity: 0;
            pointer-events: none;
        }

        .question-content.entering {
            transform: translateX(24px);
            opacity: 0;
        }

        .question-content.exiting-back {
            transform: translateX(28px);
            opacity: 0;
            pointer-events: none;
        }

        .question-content.entering-back {
            transform: translateX(-24px);
            opacity: 0;
        }

        /* Multi-select pill hint */
        .multi-select-hint {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            font-size: 11px;
            font-family: 'Inter', sans-serif;
            letter-spacing: 0.07em;
            text-transform: uppercase;
            color: var(--success);
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.25);
            padding: 5px 12px;
            border-radius: 20px;
            margin-bottom: 14px;
            transition: opacity 0.3s ease, max-height 0.3s ease;
            overflow: hidden;
        }

        .multi-select-hint.dismissed {
            opacity: 0;
            max-height: 0;
            padding: 0 12px;
            margin-bottom: 0;
        }

        /* Nav buttons */
        .nav-buttons {
            display: flex;
            gap: 12px;
            margin-top: 18px;
        }

        /* "View Your Home" dismiss button */
        .completion-dismiss-btn {
            margin-top: 20px;
            padding: 11px 26px;
            background: transparent;
            border: 1px solid var(--border-accent);
            border-radius: 12px;
            color: var(--accent);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.22s ease;
            display: block;
            width: 100%;
        }

        .completion-dismiss-btn:hover {
            background: var(--accent-dim);
            border-color: var(--accent);
            color: white;
        }

        /* Mobile layout */
        @media (max-width: 768px) {
            /* On mobile, sidebar becomes a bottom sheet */
            .survey-panel {
                top: unset;
                bottom: 0;
                left: 0;
                right: 0;
                width: 100%;
                max-height: 46vh;
                border-radius: 20px 20px 0 0;
                border-right: none;
                border-top: 1px solid var(--border-subtle);
                box-shadow: 0 -8px 40px rgba(0, 0, 0, 0.5);
                padding: 20px 20px 16px;
            }

            .survey-panel::before {
                content: '';
                width: 36px;
                height: 4px;
                background: rgba(255, 255, 255, 0.15);
                border-radius: 2px;
                margin: -8px auto 16px;
                display: block;
                letter-spacing: normal;
                text-transform: none;
                font-size: 0;
                padding: 0;
                border: none;
            }

            .survey-panel.hidden {
                transform: translateY(100%);
                opacity: 0;
            }

            .room-label {
                top: 12px;
                left: 12px;
                font-size: 12px;
            }

            .camera-controls {
                top: 12px;
                right: 12px;
                transform: translateX(0) translateY(0);
                flex-direction: row;
                gap: 6px;
                overflow-x: auto;
                scrollbar-width: none;
            }

            .camera-controls.visible {
                transform: translateX(0) translateY(0);
            }

            .camera-btn { transform: none !important; }

            .progress-dot { width: 6px; height: 6px; }
            .progress-row { gap: 8px; }
            .choices-container.cols-2 { grid-template-columns: 1fr; }
            .choice-btn { min-height: 48px; padding: 12px 14px; }
            .choice-icon { font-size: 22px; width: 30px; }
            .choice-desc { font-size: 11px; }
            .stepper-btn { width: 52px; height: 52px; }

            .completion-card {
                width: 92vw;
                padding: 28px 20px;
            }

            .completion-title { font-size: 36px; }
            .completion-emoji { font-size: 72px; }
        }

        /* --- Gamification Custom CSS --- */
        .mascot-container {
            position: fixed;
            top: 20px;
            right: 20px;
            display: flex;
            align-items: flex-start;
            flex-direction: row-reverse;
            gap: 15px;
            z-index: 1000;
            pointer-events: none;
        }

        .speech-bubble {
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.2);
            padding: 16px 20px;
            border-radius: 20px 0 20px 20px;
            color: #fff;
            font-size: 14px;
            font-weight: 500;
            max-width: 250px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            opacity: 0;
            transform: translateY(10px) scale(0.9);
            transition: all 0.4s var(--spring);
            margin-top: 10px;
        }

        .speech-bubble.visible {
            opacity: 1;
            transform: translateY(0) scale(1);
        }

        .mascot-image {
            width: auto;
            height: 200px;
            border-radius: 0;
            border: none;
            box-shadow: none;
            object-fit: contain;
            transform: translateY(-20px);
            opacity: 0;
            transition: all 0.5s var(--spring);
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.5));
        }

        .mascot-image.visible {
            transform: translateY(0);
            opacity: 1;
        }
        
        .mascot-image.celebrate {
            animation: mascot-bounce 0.5s ease;
        }

        @keyframes mascot-bounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05) translateY(-10px); }
        }

        /* Badge Enhancements */
        .badge {
            background: linear-gradient(135deg, rgba(96,165,250,0.15), rgba(16,185,129,0.15));
            border: 1px solid rgba(96,165,250,0.4);
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 15px;
            color: #fff;
            font-weight: 600;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            display: flex;
            align-items: center;
            gap: 10px;

        const createWoodTexture = () => {
            const canvas = document.createElement('canvas');
            canvas.width = 256; canvas.height = 256;

            ctx.fillStyle = '#8b4513';
            ctx.fillRect(0, 0, 256, 256);
            ctx.strokeStyle = '#5d2906';
            ctx.lineWidth = 2;
            for (let i = 0; i < 60; i++) {
                ctx.beginPath();
                ctx.moveTo(Math.random() * 256, 0);
                ctx.lineTo(Math.random() * 256 + 20, 256);
                ctx.stroke();
            }
            return new THREE.CanvasTexture(canvas);
        };

        // Procedural Textures instead of Unsplash to avoid CORS black-texture drops
        const createProceduralGrass = () => {
            const canvas = document.createElement('canvas');
            canvas.width = 512; canvas.height = 512;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#4a8a2a';
            ctx.fillRect(0, 0, 512, 512);
            for (let i = 0; i < 20000; i++) {
                ctx.fillStyle = Math.random() > 0.5 ? '#5a9a3a' : '#3a7a1a';
                ctx.fillRect(Math.random() * 512, Math.random() * 512, 2, 6);
            }
            return new THREE.CanvasTexture(canvas);
        };

        const createProceduralWoodPlank = () => {
            const canvas = document.createElement('canvas');
            canvas.width = 512; canvas.height = 512;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#8b5a2b';
            ctx.fillRect(0, 0, 512, 512);
            for (let i = 0; i < 10000; i++) {
                ctx.fillStyle = Math.random() > 0.5 ? 'rgba(0,0,0,0.05)' : 'rgba(255,255,255,0.03)';
                ctx.fillRect(Math.random() * 512, Math.random() * 512, 10, 2);
            }
            ctx.strokeStyle = '#5b3a0b';
            ctx.lineWidth = 4;
            for (let i = 1; i < 8; i++) {
                ctx.beginPath();
                ctx.moveTo(0, (512 / 8) * i);
                ctx.lineTo(512, (512 / 8) * i);
                ctx.stroke();
            }
            return new THREE.CanvasTexture(canvas);
        };

        const grassTex = createProceduralGrass();
        grassTex.wrapS = THREE.RepeatWrapping; grassTex.wrapT = THREE.RepeatWrapping;

            // Sky gradient (dusk)

        function createStars() {

            const starsMaterial = new THREE.PointsMaterial({

            starsGeometry.setAttribute('position', new THREE.Float32BufferAttribute(starsVertices, 3));

            scene.add(stars);

        function createTrees() {
            function makeTree(x, z, trunkH, crownR, type, crownColor) {
                const group = new THREE.Group();
                const trunkMat = new THREE.MeshStandardMaterial({ color: 0x5c3a1e, roughness: 0.9, metalness: 0 });

                // Trunk
                const trunk = new THREE.Mesh(
                    new THREE.CylinderGeometry(0.1, 0.18, trunkH, 12),
                    trunkMat
                );
                trunk.position.y = trunkH / 2;
                trunk.castShadow = true;
                group.add(trunk);

                const leafMat = new THREE.MeshStandardMaterial({ 
                    color: crownColor || 0x1a5c10, 
                    roughness: 0.8,
                    metalness: 0
                });

                if (type === 'pine') {
                    for (let i = 0; i < 4; i++) {
                        const cone = new THREE.Mesh(
                            new THREE.ConeGeometry(crownR * (1 - i * 0.22), crownR * 1.0, 12),
                            leafMat
                        );
                        cone.position.y = trunkH * 0.8 + i * crownR * 0.6;
                        cone.castShadow = true;
                        group.add(cone);
                    }
                } else {
                    const leafPositions = [
                        [0, trunkH + crownR * 0.6, 0],
                        [crownR * 0.4, trunkH + crownR * 0.4, crownR * 0.3],
                        [-crownR * 0.4, trunkH + crownR * 0.4, -crownR * 0.2],
                        [crownR * 0.3, trunkH + crownR * 0.2, -crownR * 0.4],
                        [-0.2 * crownR, trunkH + crownR * 0.8, 0.2 * crownR]
                    ];
                    
                    leafPositions.forEach((pos, i) => {
                        const leafSphere = new THREE.Mesh(
                            new THREE.SphereGeometry(crownR * (0.6 + Math.random() * 0.4), 12, 12),
                            leafMat
                        );
                        leafSphere.position.set(...pos);
                        leafSphere.castShadow = true;
                        group.add(leafSphere);
                    });
                }

                group.position.set(x, -0.1, z);
                scene.add(group);
            }

            // High-fidelity yard trees (cleared trees close to house for better visibility)
            // makeTree(-5, 4, 1.8, 1.4, 'deciduous', 0x245e12);  // Too close, blocks view
            // makeTree(-3, 0, 1.4, 1.2, 'deciduous', 0x3d7a22);  // Too close, blocks view

            // makeTree(-8, -4, 2.2, 1.5, 'deciduous', 0x1e5a1a); // Too close, blocks view
            // makeTree(5, 8, 1.6, 1.2, 'deciduous', 0x4a9a3a);   // Too close, blocks view
            // makeTree(8, 14, 2.0, 1.3, 'deciduous', 0x3a8a2a);  // Too close, blocks view

            // Background pines (distant)

            makeTree(-18, -6, 3.5, 1.8, 'pine', 0x1e6414);

            makeTree(14, -4, 2.5, 1.2, 'pine', 0x226b18);
            makeTree(-12, -14, 2.8, 1.4, 'pine', 0x1a5c10);

        function createBushes() {

        function createFence() {
            const postMat = new THREE.MeshLambertMaterial({ color: 0xe8dcc0 });
            const railMat = new THREE.MeshLambertMaterial({ color: 0xf0e8d8 });

            // Fence along front property line (z = 5, between yard and sidewalk)
            // Gap for walkway (x ≈ 1) and driveway (x ≈ 3)
            const sections = [
                { from: -7, to: 0, z: 5 },    // left section
                { from: 4.5, to: 8, z: 5 },    // right of driveway
            ];
            sections.forEach(sec => {
                const len = sec.to - sec.from;
                const cx = (sec.from + sec.to) / 2;

                // Top rail
                const rail = new THREE.Mesh(new THREE.BoxGeometry(len, 0.06, 0.06), railMat);
                rail.position.set(cx, 0.55, sec.z);
                scene.add(rail);
                // Bottom rail
                const rail2 = new THREE.Mesh(new THREE.BoxGeometry(len, 0.06, 0.06), railMat);
                rail2.position.set(cx, 0.22, sec.z);
                scene.add(rail2);

                // Pickets
                const numPickets = Math.max(2, Math.ceil(len / 0.35));
                for (let i = 0; i < numPickets; i++) {
                    const picket = new THREE.Mesh(new THREE.BoxGeometry(0.06, 0.7, 0.04), postMat);
                    picket.position.set(sec.from + (i / (numPickets - 1)) * len, 0.3, sec.z);
                    picket.castShadow = true;
                    scene.add(picket);
                }
            });
        }

        // =================================================================
        // CONSTRUCTION PHASE SYSTEM
        // =================================================================

        let previousPhase = 'structure';

        function getConstructionPhase(questionIndex) {
            // Default to 'structure' (solid exterior) if not initialized
            if (questionIndex === undefined || questionIndex === null) return 'structure';
            if (questionIndex <= 2) return 'structure';     // Q1-Q3: Full exterior with roof
            if (questionIndex === 3) return 'floorplan';    // Q4: Cutaway, room dividers
            if (questionIndex === 4) return 'movein';       // Q5: Cutaway, people appear
            if (questionIndex <= 10) return 'systems';      // Q6-Q11: Cutaway, appliances
            if (questionIndex === 11) return 'roofing';     // Q12: Roof returns, solar
            if (questionIndex <= 13) return 'outdoors';     // Q13-Q14: Full exterior, garage/pool
            return 'livingspace';                           // Q15: Cutaway, entertainment
        }

        function isExteriorPhase(phase) {
            return phase === 'structure' || phase === 'roofing' || phase === 'outdoors';
        }

        function isCutawayPhase(phase) {
            return phase === 'floorplan' || phase === 'movein' || phase === 'systems' || phase === 'livingspace';
        }

        function addWindows(floor, y, isOccupied, houseWidth, houseDepth) {
            const glassColor = isOccupied ? 0xffeeaa : 0x7ab8e0;
            const glassMat = new THREE.MeshStandardMaterial({
                color: glassColor,
                emissive: glassColor,
                emissiveIntensity: isOccupied ? 0.4 : 0.15,
                transparent: true,
                opacity: 0.85,
                roughness: 0.05,
                metalness: 0.2
            });
            const frameMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.3, metalness: 0.4, emissive: 0xcccccc, emissiveIntensity: 0.1 });
            const sillMat = new THREE.MeshStandardMaterial({ color: 0xd4a574, roughness: 0.6, metalness: 0.1, emissive: 0x8b7355, emissiveIntensity: 0.05 });

            function addFramedWindow(x, wy, z, rotY) {
                const group = new THREE.Group();
                const wW = 1.0, wH = 1.4;

                // Glass pane
                const glass = new THREE.Mesh(new THREE.BoxGeometry(wW, wH, 0.06), glassMat);
                glass.castShadow = true;
                group.add(glass);

                // Frame (4 bars) - made thicker and more visible
                const fT = 0.12;
                // Top
                const topFrame = new THREE.Mesh(new THREE.BoxGeometry(wW + fT * 2, fT, 0.08), frameMat);
                topFrame.castShadow = true;
                group.add(topFrame.clone().translateY(wH / 2));
                // Bottom
                const bottomFrame = new THREE.Mesh(new THREE.BoxGeometry(wW + fT * 2, fT, 0.08), frameMat);
                bottomFrame.castShadow = true;
                group.add(bottomFrame.clone().translateY(-wH / 2));
                // Left
                const leftFrame = new THREE.Mesh(new THREE.BoxGeometry(fT, wH, 0.08), frameMat);
                leftFrame.castShadow = true;
                group.add(leftFrame.clone().translateX(-wW / 2 - fT / 2));
                // Right
                const rightFrame = new THREE.Mesh(new THREE.BoxGeometry(fT, wH, 0.08), frameMat);
                rightFrame.castShadow = true;
                group.add(rightFrame.clone().translateX(wW / 2 + fT / 2));
                // Center mullion (vertical)
                const vertMullion = new THREE.Mesh(new THREE.BoxGeometry(0.06, wH, 0.07), frameMat);
                vertMullion.castShadow = true;
                group.add(vertMullion);
                // Center mullion (horizontal)
                const horizMullion = new THREE.Mesh(new THREE.BoxGeometry(wW, 0.06, 0.07), frameMat);
                horizMullion.castShadow = true;
                group.add(horizMullion.clone().translateY(0.1));

                // Sill
                const sill = new THREE.Mesh(new THREE.BoxGeometry(wW + 0.3, 0.08, 0.2), sillMat);
                sill.position.y = -wH / 2 - 0.04;
                group.add(sill);

                // Lintel (header)
                const lintel = new THREE.Mesh(new THREE.BoxGeometry(wW + 0.2, 0.12, 0.12), sillMat);
                lintel.position.y = wH / 2 + 0.06;
                group.add(lintel);

                group.position.set(x, wy, z);
                if (rotY) group.rotation.y = rotY;
                houseGroup.add(group);
            }

            // Front windows (positioned in front of wall, not inside it)
            const numWindows = 3;
            const spacing = (houseWidth * 0.7) / numWindows;
            for (let i = 0; i < numWindows; i++) {
                const wx = -houseWidth * 0.25 + i * spacing;
                // Skip window if it would overlap with door position (x ≈ 2)
                if (Math.abs(wx - 2) < 1.6) continue;
                addFramedWindow(wx, y, houseDepth / 2 + 0.15, 0);
            }

            // Back windows (positioned in front of back wall)
            for (let i = 0; i < 2; i++) {
                addFramedWindow(-houseWidth * 0.2 + i * spacing * 1.2, y, -houseDepth / 2 - 0.15, Math.PI);
            }

            // Side windows (positioned in front of side walls)
            addFramedWindow(-houseWidth / 2 - 0.15, y, 0, Math.PI / 2);
            addFramedWindow(houseWidth / 2 + 0.15, y, 0, -Math.PI / 2);
        }

        function addWindowLights(floor, y, houseWidth, houseDepth) {
            // Add warm glowing lights behind windows for nighttime effect
            const lightColor = 0xffeeaa;
            const lightIntensity = 0.6;

            // Front window lights
            const numWindows = 3;
            const spacing = (houseWidth * 0.7) / numWindows;
            for (let i = 0; i < numWindows; i++) {
                const wx = -houseWidth * 0.25 + i * spacing;
                if (Math.abs(wx - 2) < 1.6) continue;
                const light = new THREE.PointLight(lightColor, lightIntensity, 5);
                light.position.set(wx, y, houseDepth / 2 + 0.5);
                houseGroup.add(light);
            }

            // Back window lights
            for (let i = 0; i < 2; i++) {
                const wx = -houseWidth * 0.2 + i * spacing * 1.2;
                const light = new THREE.PointLight(lightColor, lightIntensity, 5);
                light.position.set(wx, y, -houseDepth / 2 - 0.5);
                houseGroup.add(light);
            }

            // Side window lights
            const sideLight1 = new THREE.PointLight(lightColor, lightIntensity * 0.8, 4);
            sideLight1.position.set(-houseWidth / 2 - 0.5, y, 0);
            houseGroup.add(sideLight1);

            const sideLight2 = new THREE.PointLight(lightColor, lightIntensity * 0.8, 4);
            sideLight2.position.set(houseWidth / 2 + 0.5, y, 0);
            houseGroup.add(sideLight2);
        }

        function addDoor(houseDepth) {
            const hd = houseDepth;

            // Door frame - more prominent and detailed (positioned in front of wall)
            const frameMat = new THREE.MeshStandardMaterial({
                color: 0xffd9a8,
                roughness: 0.4,
                metalness: 0.2,
                emissive: 0xd4a574,
                emissiveIntensity: 0.2
            });
            // Left jamb
            const leftJamb = new THREE.Mesh(new THREE.BoxGeometry(0.15, 2.4, 0.25), frameMat);
            leftJamb.castShadow = true;
            leftJamb.translateX(2 - 0.66).translateY(1.2).translateZ(hd / 2 + 0.15);
            houseGroup.add(leftJamb);
            // Right jamb
            const rightJamb = new THREE.Mesh(new THREE.BoxGeometry(0.15, 2.4, 0.25), frameMat);

        function addRoof(height, houseWidth, houseDepth) {
            // Gable roof using two sloped planes
            const roofOverhang = 0.8;
            const roofW = houseWidth + roofOverhang * 2;
            const roofD = houseDepth + roofOverhang * 2;
            const roofPeak = 2.5;
            const roofMat = new THREE.MeshStandardMaterial({ color: 0x5a2810, roughness: 0.8, metalness: 0.0 });

            // Left slope
            const slopeLen = Math.sqrt((roofW / 2) ** 2 + roofPeak ** 2);
            const slopeAngle = Math.atan2(roofPeak, roofW / 2);
            const leftSlope = new THREE.Mesh(
                new THREE.BoxGeometry(slopeLen, 0.12, roofD),
                roofMat
            );
            leftSlope.position.set(-roofW / 4, height + roofPeak / 2, 0);
            leftSlope.rotation.z = slopeAngle;
            leftSlope.castShadow = true;
            leftSlope.userData.isRoofElement = true;
            houseGroup.add(leftSlope);

            // Right slope
            const rightSlope = new THREE.Mesh(
                new THREE.BoxGeometry(slopeLen, 0.12, roofD),
                roofMat
            );
            rightSlope.position.set(roofW / 4, height + roofPeak / 2, 0);
            rightSlope.rotation.z = -slopeAngle;
            rightSlope.castShadow = true;
            rightSlope.userData.isRoofElement = true;
            houseGroup.add(rightSlope);

            // Ridge beam (top)
            const ridge = new THREE.Mesh(
                new THREE.BoxGeometry(0.15, 0.15, roofD + 0.3),
                new THREE.MeshStandardMaterial({ color: 0x4a1f0a, roughness: 0.7, metalness: 0.05 })
            );
            ridge.position.set(0, height + roofPeak, 0);
            ridge.castShadow = true;
            ridge.userData.isRoofElement = true;
            houseGroup.add(ridge);

            // Gable triangles (front and back)
            const gableMat = new THREE.MeshStandardMaterial({ color: 0xe0d4c4, roughness: 0.6, metalness: 0.0 });
            const gableShape = new THREE.Shape();
            gableShape.moveTo(-roofW / 2, 0);
            gableShape.lineTo(0, roofPeak);
            gableShape.lineTo(roofW / 2, 0);
            gableShape.lineTo(-roofW / 2, 0);
            const gableGeo = new THREE.ShapeGeometry(gableShape);

            const frontGable = new THREE.Mesh(gableGeo, gableMat);
            frontGable.position.set(0, height, -roofD / 2 + roofOverhang);
            frontGable.userData.isRoofElement = true;
            houseGroup.add(frontGable);

            const backGable = new THREE.Mesh(gableGeo, gableMat);
            backGable.position.set(0, height, roofD / 2 - roofOverhang);
            backGable.rotation.y = Math.PI;
            backGable.userData.isRoofElement = true;
            houseGroup.add(backGable);

            // Fascia boards (under roof edges)
            const fasciaMat = new THREE.MeshStandardMaterial({ color: 0xd4a574, roughness: 0.5, metalness: 0.1 });
            // Front fascia
            const frontFascia = new THREE.Mesh(new THREE.BoxGeometry(roofW, 0.2, 0.1), fasciaMat);
            frontFascia.position.set(0, height, -roofD / 2);
            frontFascia.castShadow = true;
            frontFascia.userData.isRoofElement = true;
            houseGroup.add(frontFascia);
            // Back fascia
            const backFascia = new THREE.Mesh(new THREE.BoxGeometry(roofW, 0.2, 0.1), fasciaMat);
            backFascia.position.set(0, height, roofD / 2);
            backFascia.castShadow = true;
            backFascia.userData.isRoofElement = true;
            houseGroup.add(backFascia);
        }

        function addDwellingTypeLabel(dwellingType) {
            // Only show label if dwelling type has been selected AND not on bedroom question
            if (!surveyState || !surveyState.answers || !surveyState.answers.Q1 || surveyState.currentQuestionIndex === 3) {
                return; // Don't show on Q4 (bedroom question, index 3)
            }

            // Create a text sprite to show dwelling type
            const canvas = document.createElement('canvas');
            canvas.width = 512;
            canvas.height = 192;
            const context = canvas.getContext('2d');

            // Background
            context.fillStyle = 'rgba(0, 0, 0, 0.7)';
            context.fillRect(0, 0, canvas.width, canvas.height);

            // Text
            context.fillStyle = '#ffffff';
            context.font = 'bold 48px Arial';
            context.textAlign = 'center';
            context.textBaseline = 'middle';

            const typeNames = {
                'SingleFamily': '🏡 Single Family Home',
                'Apartment': '🏢 Apartment',
                'Townhouse': '🏘️ Townhouse',
                'Condo': '🏬 Condominium'
            };

            context.fillText(typeNames[dwellingType] || dwellingType, canvas.width / 2, canvas.height / 3);

            // Add size info only if Q3 has been answered
            if (surveyState.answers.Q3) {
                context.font = 'bold 32px Arial';
                context.fillStyle = '#aaaaaa';
                context.fillText(`📏 ${surveyState.livingArea} sq ft (Prototype Scale)`, canvas.width / 2, canvas.height * 2 / 3);
            }

            // Create sprite
            const texture = new THREE.CanvasTexture(canvas);
            const spriteMaterial = new THREE.SpriteMaterial({ map: texture });
            const sprite = new THREE.Sprite(spriteMaterial);
            sprite.scale.set(8, 3, 1);
            sprite.position.set(0, surveyState.floors * 3 + 5, 0);
            houseGroup.add(sprite);
        }

        // Helper function to create realistic appliance sprite with image
        function createApplianceIcon(imageUrl, label, bgColor = '#ffffff') {
            const canvas = document.createElement('canvas');
            canvas.width = 512;
            canvas.height = 512;
            const context = canvas.getContext('2d');

            // Create sprite immediately with placeholder
            const texture = new THREE.CanvasTexture(canvas);
            const spriteMaterial = new THREE.SpriteMaterial({
                map: texture,
                transparent: true
            });
            const sprite = new THREE.Sprite(spriteMaterial);
            sprite.scale.set(1.2, 1.2, 1);

            // Draw placeholder background
            context.fillStyle = bgColor;
            context.fillRect(0, 0, 512, 512);
            context.fillStyle = '#333333';
            context.font = 'bold 24px Arial';
            context.textAlign = 'center';
            context.textBaseline = 'middle';
            context.fillText('Loading...', 256, 256);
            texture.needsUpdate = true;

            // Load actual image
            const image = new Image();
            image.crossOrigin = 'anonymous';
            image.onload = function() {
                // Clear canvas
                context.clearRect(0, 0, 512, 512);

                // Draw white background with rounded corners
                context.fillStyle = '#ffffff';
                context.shadowColor = 'rgba(0, 0, 0, 0.3)';
                context.shadowBlur = 20;
                context.shadowOffsetX = 0;
                context.shadowOffsetY = 10;
                roundRect(context, 10, 10, 492, 492, 20);
                context.fill();
                context.shadowBlur = 0;

                // Draw image centered with padding
                const padding = 40;
                const maxW = 512 - padding * 2;
                const maxH = 400;
                const scale = Math.min(maxW / image.width, maxH / image.height, 1);
                const w = image.width * scale;
                const h = image.height * scale;
                const x = (512 - w) / 2;
                const y = padding + (maxH - h) / 2;

                context.drawImage(image, x, y, w, h);

                // Draw label background
                context.fillStyle = bgColor;
                context.fillRect(0, 420, 512, 92);

                // Draw label text
                context.fillStyle = '#ffffff';
                context.font = 'bold 32px Arial';
                context.textAlign = 'center';
                context.textBaseline = 'middle';
                context.fillText(label, 256, 466);

                texture.needsUpdate = true;
            };

            image.onerror = function() {
                // Fallback to text-only display
                context.clearRect(0, 0, 512, 512);
                context.fillStyle = bgColor;
                roundRect(context, 10, 10, 492, 492, 20);
                context.fill();

                context.fillStyle = '#ffffff';
                context.font = 'bold 40px Arial';
                context.textAlign = 'center';
                context.textBaseline = 'middle';
                context.fillText(label, 256, 256);

                texture.needsUpdate = true;
            };

            image.src = imageUrl;

            return sprite;
        }

        // Helper function to draw rounded rectangle
        function roundRect(ctx, x, y, width, height, radius) {
            ctx.beginPath();
            ctx.moveTo(x + radius, y);
            ctx.lineTo(x + width - radius, y);
            ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
            ctx.lineTo(x + width, y + height - radius);
            ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
            ctx.lineTo(x + radius, y + height);
            ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
            ctx.lineTo(x, y + radius);
            ctx.quadraticCurveTo(x, y, x + radius, y);
            ctx.closePath();
        }

        function createTextLabel(text, bgColor = '#ffffff') {
            const canvas = document.createElement('canvas');
            canvas.width = 512;
            canvas.height = 256;

            // Background with rounded corners
            context.fillStyle = bgColor;
            context.shadowColor = 'rgba(0, 0, 0, 0.5)';
            context.shadowBlur = 20;
            context.shadowOffsetX = 0;
            context.shadowOffsetY = 10;
            roundRect(context, 10, 10, 492, 236, 20);
            context.fill();
            context.shadowBlur = 0;

            // Text
            context.fillStyle = '#ffffff';

            context.textAlign = 'center';

            // Create sprite
            const texture = new THREE.CanvasTexture(canvas);
            const spriteMaterial = new THREE.SpriteMaterial({
                map: texture,
                transparent: true
            });
            const sprite = new THREE.Sprite(spriteMaterial);
            sprite.scale.set(2, 1, 1);

                    plank.position.y = -h/2 + (i * plankH) + plankH/2;

        // Create realistic bedroom layout with interior walls
        function createBedroomLayout(bedroomCount, floors) {
            console.log('🛏️ Creating architectural bedroom layout - Count:', bedroomCount);
            const wallHeight = 2.6;
            const wallThickness = 0.15; // Realistic wall thickness
            // Wall colors - unique color per bedroom
            const wallColors = [
                0xf5e6d3, // Warm cream
                0xe8d7f1, // Soft lavender
                0xd4e4f7, // Light blue
                0xd9f0d9  // Soft green
            ];

            const doorMaterial = new THREE.MeshLambertMaterial({ color: 0x8b7355 }); // Wood brown doors

            // Define bedroom layouts for different counts
            const layouts = {
                1: [ // 1 bedroom layout
                    { x: 0, z: -1.5, width: 8, depth: 5, name: "Master Bedroom" }
                ],
                2: [ // 2 bedroom layout - side by side
                    { x: -2.5, z: -1.5, width: 4, depth: 5, name: "Bedroom 1" },
                    { x: 2.5, z: -1.5, width: 4, depth: 5, name: "Bedroom 2" }
                ],
                3: [ // 3 bedroom layout - 2 on ground, 1 upstairs
                    { x: -2.5, z: -1.5, width: 4, depth: 5, floor: 0, name: "Bedroom 1" },
                    { x: 2.5, z: -1.5, width: 4, depth: 5, floor: 0, name: "Bedroom 2" },
                    { x: 0, z: -1.5, width: 6, depth: 5, floor: 1, name: "Master Bedroom" }
                ],
                4: [ // 4 bedroom layout - 2 per floor
                    { x: -2.5, z: -1.5, width: 4, depth: 5, floor: 0, name: "Bedroom 1" },
                    { x: 2.5, z: -1.5, width: 4, depth: 5, floor: 0, name: "Bedroom 2" },
                    { x: -2.5, z: -1.5, width: 4, depth: 5, floor: 1, name: "Bedroom 3" },
                    { x: 2.5, z: -1.5, width: 4, depth: 5, floor: 1, name: "Bedroom 4" }
                ]
            };

            const roomLayout = layouts[Math.min(bedroomCount, 4)] || layouts[2];

            roomLayout.forEach((room, i) => {
                const floor = room.floor || 0;
                const yBase = floor * 3;

                // Create floor for the room - solid color with texture
                const floorGeometry = new THREE.BoxGeometry(room.width - 0.2, 0.1, room.depth - 0.2);
                const floorColors = [0xc9a76a, 0xd4b896, 0xe5c9a8, 0xb89968];
                const floorMaterial = new THREE.MeshLambertMaterial({
                    color: floorColors[i % floorColors.length]
                });
                const floorMesh = new THREE.Mesh(floorGeometry, floorMaterial);
                floorMesh.position.set(room.x, yBase + 0.05, room.z);
                floorMesh.receiveShadow = true;
                appliancesGroup.add(floorMesh);

                // Add area rug for warmth
                const rugGeometry = new THREE.BoxGeometry(room.width * 0.6, 0.02, room.depth * 0.7);
                const rugColors = [0xd9534f, 0x5bc0de, 0x5cb85c, 0xf0ad4e, 0x9b59b6];
                const rugMaterial = new THREE.MeshLambertMaterial({
                    color: rugColors[i % rugColors.length]
                });
                const rug = new THREE.Mesh(rugGeometry, rugMaterial);
                rug.position.set(room.x, yBase + 0.08, room.z + 0.3);
                appliancesGroup.add(rug);

                // Create unique wall material for this bedroom
                const bedroomWallMaterial = new THREE.MeshLambertMaterial({
                    color: wallColors[i % wallColors.length],
                    side: THREE.DoubleSide
                });

                // Create interior walls for the room
                // Left wall
                if (i % 2 === 0 || bedroomCount === 1) {
                    const leftWall = new THREE.Mesh(
                        new THREE.BoxGeometry(wallThickness, wallHeight, room.depth),
                        bedroomWallMaterial
                    );
                    leftWall.position.set(room.x - room.width / 2, yBase + wallHeight / 2, room.z);
                    leftWall.castShadow = true;
                    appliancesGroup.add(leftWall);
                }

                // Right wall
                if (i % 2 === 1 || bedroomCount === 1) {
                    const rightWall = new THREE.Mesh(
                        new THREE.BoxGeometry(wallThickness, wallHeight, room.depth),
                        bedroomWallMaterial
                    );
                    rightWall.position.set(room.x + room.width / 2, yBase + wallHeight / 2, room.z);
                    rightWall.castShadow = true;
                    appliancesGroup.add(rightWall);
                }

                // Back wall with window
                const backWall = new THREE.Mesh(
                    new THREE.BoxGeometry(room.width, wallHeight, wallThickness),
                    bedroomWallMaterial
                );
                backWall.position.set(room.x, yBase + wallHeight / 2, room.z - room.depth / 2);
                backWall.castShadow = true;
                appliancesGroup.add(backWall);

                // Front wall with door
                const doorWidth = 1.0;
                const wallSegmentWidth = (room.width - doorWidth) / 2;

                const frontWallLeft = new THREE.Mesh(
                    new THREE.BoxGeometry(wallSegmentWidth, wallHeight, wallThickness),
                    bedroomWallMaterial
                );
                frontWallLeft.position.set(room.x - room.width / 2 + wallSegmentWidth / 2, yBase + wallHeight / 2, room.z + room.depth / 2);
                appliancesGroup.add(frontWallLeft);

                const frontWallRight = new THREE.Mesh(
                    new THREE.BoxGeometry(wallSegmentWidth, wallHeight, wallThickness),
                    bedroomWallMaterial
                );
                frontWallRight.position.set(room.x + room.width / 2 - wallSegmentWidth / 2, yBase + wallHeight / 2, room.z + room.depth / 2);
                appliancesGroup.add(frontWallRight);

                // Door
                const door = new THREE.Mesh(
                    new THREE.BoxGeometry(doorWidth * 0.9, 2.2, 0.08),
                    doorMaterial
                );
                door.position.set(room.x, yBase + 1.1, room.z + room.depth / 2);
                door.castShadow = true;
                appliancesGroup.add(door);

                // Simple dresser - opposite wall from bed
                const dresserMat = new THREE.MeshLambertMaterial({ color: 0xa0826d });
                const dresser = new THREE.Mesh(
                    new THREE.BoxGeometry(1.2, 0.8, 0.4),
                    dresserMat
                );
                dresser.position.set(room.x + room.width / 4, yBase + 0.4, room.z + room.depth / 3);
                dresser.castShadow = true;
                appliancesGroup.add(dresser);

                // Add bed to the room
                const bed = createBed(i);
                bed.position.set(room.x - room.width / 4, yBase + 0.6, room.z - room.depth / 4);
                bed.rotation.y = Math.PI / 2;
                appliancesGroup.add(bed);
                placedObjects.beds.push(bed);

                // Add room label
                createRoomLabel(room.name, room.x, yBase + wallHeight + 0.5, room.z, i);
            });
        }

        function createRoomLabel(text, x, y, z, colorIndex) {
            const canvas = document.createElement('canvas');
            canvas.width = 512;
            canvas.height = 128; // Standardized height
            const context = canvas.getContext('2d');

            const colors = [
                'rgba(45, 52, 54, 0.95)', // Modern dark slate
                'rgba(45, 52, 54, 0.95)', 
                'rgba(45, 52, 54, 0.95)', 
                'rgba(45, 52, 54, 0.95)'
            ];

            // Rounded rectangle background
            context.fillStyle = colors[colorIndex % colors.length];
            context.beginPath();
            context.roundRect(0, 0, canvas.width, canvas.height, 20);
            context.fill();

            // Accent border
            context.strokeStyle = '#00aeef'; // Corporate blue accent
            context.lineWidth = 6;
            context.strokeRect(4, 4, canvas.width - 8, canvas.height - 8);

            // Icon detection
            let icon = '🛏️';
            if (text.toLowerCase().includes('kitchen')) icon = '🍳';
            if (text.toLowerCase().includes('bath')) icon = '🛁';
            if (text.toLowerCase().includes('living')) icon = '🛋️';

            // Text
            context.fillStyle = '#ffffff';
            context.font = '600 48px Inter, Arial, sans-serif';
            context.textAlign = 'center';
            context.textBaseline = 'middle';
            context.fillText(`${icon} ${text.toUpperCase()}`, canvas.width / 2, canvas.height / 2);

            const texture = new THREE.CanvasTexture(canvas);
            const spriteMaterial = new THREE.SpriteMaterial({
                map: texture,
                transparent: true,
                depthTest: false  // Renders on top, prevents z-fighting
            });
            const sprite = new THREE.Sprite(spriteMaterial);
            sprite.scale.set(1.8, 0.45, 1); // Reduced size, less intrusive (was 3, 0.75)
            sprite.position.set(x, Math.min(y, 2.8), z);  // Cap at ceiling height
            appliancesGroup.add(sprite);
        }

        // =================================================================
        // SCENE UPDATE & OBJECT PLACEMENT
        // =================================================================

        function updateScene() {
            // SAVE existing people BEFORE clearing
            const existingPeople = placedObjects.people ? [...placedObjects.people] : [];
            const previousPeopleCount = existingPeople.length;

            // Track which appliances were VISUALLY placed (not just initialized as null)
            const previouslyPlacedAppliances = new Set();
            if (placedObjects) {
                for (const key in placedObjects) {
                    const obj = placedObjects[key];
                    // Only consider it "previously placed" if it's not null/undefined and was animated
                    if (obj && !Array.isArray(obj) && obj.userData && obj.userData.animateIn !== undefined) {
                        previouslyPlacedAppliances.add(key);
                    }
                }
            }

            // Always clear appliances/people/rooms, but recreate them fresh
            while (appliancesGroup.children.length > 0) {
                appliancesGroup.remove(appliancesGroup.children[0]);
            }

            // Clean up appliances that are no longer selected
            for (const key in placedObjects) {
                placedObjects[key] = null;
            }
            placedObjects.beds = [];
            placedObjects.people = [];
            placedObjects.solar = [];

            // buildHouse() will handle floors based on dwelling type (apartments get multiple floors, single-family always 1)
            // Do NOT override surveyState.floors here - let building-specific logic in buildHouse() handle it
            buildHouse();

            // Trigger roof lift/descend animations based on phase transitions
            const currentPhase = getConstructionPhase(surveyState.currentQuestionIndex);
            const needsCutawayView = isCutawayPhase(currentPhase);
            console.log('🎯 PHASE CHECK: Q' + (surveyState.currentQuestionIndex + 1) + ' → phase="' + currentPhase + '" (cutaway=' + needsCutawayView + ')');
            if (previousPhase !== currentPhase) {
                console.log('   🎬 Phase transition:', previousPhase, '→', currentPhase);

                // When transitioning TO cutaway phase (lift roof up)
                if (isCutawayPhase(currentPhase) && isExteriorPhase(previousPhase)) {
                    console.log('      🚀 Lifting roof...');
                    houseGroup.traverse(child => {
                        if (child.userData && child.userData.isRoofElement) {
                            const startY = child.position.y;
                            child.userData.roofAnimating = true;
                            child.userData.targetY = startY + 8;  // Lift 8 units up
                            child.userData.targetOpacity = 0;
                            if (child.material) child.material.transparent = true;
                        }
                    });
                }
                // When transitioning FROM cutaway phase (descend roof down)
                else if (isExteriorPhase(currentPhase) && isCutawayPhase(previousPhase)) {
                    console.log('      📉 Descending roof...');
                    houseGroup.traverse(child => {
                        if (child.userData && child.userData.isRoofElement) {
                            const targetY = child.position.y - 8;  // Descend 8 units down
                            child.userData.roofAnimating = true;
                            child.userData.targetY = targetY;
                            child.userData.targetOpacity = 1;
                            if (child.material) child.material.transparent = false;
                        }
                    });
                }

                previousPhase = currentPhase;
            }

            // Place appliances based on answers
            const answers = surveyState.answers;
            console.log('🔍 DEBUG updateScene:');
            console.log('   Current Q index:', surveyState.currentQuestionIndex);
            console.log('   Answers:', Object.keys(answers).map(k => k + '=' + answers[k]));
            console.log('   Q5 answer:', answers.Q5);
            console.log('   Occupants:', surveyState.occupants);

            // Heating - position scaled relative to house dimensions
            const houseWidthForAppliances = houseGroup.userData.houseWidth || 10;
            const houseDepthForAppliances = houseGroup.userData.houseDepth || 7.5;

            if (answers.Q6 && answers.Q6.includes('heating')) {
                console.log('   🔥 Creating Central Furnace');
                placedObjects.heating = createFurnace();
                const furnaceTargetY = 0.6;
                const furnaceX = Math.min(3.2, houseWidthForAppliances * 0.3);  // Scale with house width
                const furnaceZ = Math.max(-1.5, -houseDepthForAppliances * 0.2);  // Scale with house depth
                placedObjects.heating.position.set(furnaceX, furnaceTargetY + 5, furnaceZ);  // Start 5 units above
                placedObjects.heating.scale.set(0, 0, 0);  // Start invisible
                // Only animate if this is a NEW appliance (wasn't placed before)
                if (!previouslyPlacedAppliances.has('heating')) {
                    placedObjects.heating.userData.animateIn = true;
                }
                placedObjects.heating.userData.targetY = furnaceTargetY;
                appliancesGroup.add(placedObjects.heating);
            }

            if (answers.Q6 && answers.Q6.includes('heatPump')) {
                console.log('   🔥 Creating Heat Pump');
                placedObjects.heatPump = createHeatPump();
                const heatPumpTargetY = 1.2;
                placedObjects.heatPump.position.set(5.5, heatPumpTargetY + 5, 0);  // Start 5 units above
                placedObjects.heatPump.scale.set(0, 0, 0);  // Start invisible
                placedObjects.heatPump.rotation.y = Math.PI;
                // Only animate if NEW
                if (!previouslyPlacedAppliances.has('heatPump')) {
                    placedObjects.heatPump.userData.animateIn = true;
                }
                placedObjects.heatPump.userData.targetY = heatPumpTargetY;
                appliancesGroup.add(placedObjects.heatPump);
            }

            if (answers.Q6 && answers.Q6.includes('radiatorsHeater')) {
                // Get house dimensions from houseGroup userData
                const houseWidth = houseGroup.userData.houseWidth || 20;
                const houseDepth = houseGroup.userData.houseDepth || 15;

                console.log('   🔥 Creating 3D Baseboard Heater - LARGE');

                // Create 3D baseboard heater model
                const baseboardHeater = createBaseboardHeater();

                // Position along the BACK wall in LIVING HALL area (avoid bathroom appliances!)
                const backWallZ = -houseDepth / 2 + 0.8;  // Just inside BACK wall
                // Use hallX position (will be defined later, so use placeholder for now)
                const heaterX = 3;  // Right side, living hall area
                const heaterTargetY = 0.3;
                baseboardHeater.position.set(heaterX, heaterTargetY + 5, backWallZ);  // Start 5 units above
                baseboardHeater.rotation.y = Math.PI;  // Facing back wall
                baseboardHeater.scale.set(0, 0, 0);  // Start invisible, will scale up
                if (!previouslyPlacedAppliances.has('baseboardHeaters')) {
                    baseboardHeater.userData.animateIn = true;
                }
                baseboardHeater.userData.targetY = heaterTargetY;
                appliancesGroup.add(baseboardHeater);

                placedObjects.baseboardHeaters = [baseboardHeater];
                console.log('   🔥 3D Baseboard heater on BACK WALL in Living Hall (2.5x scale) at x=' + heaterX + ', z=' + backWallZ.toFixed(2));
            }

            // ==============================================
            // FLOOR PLAN LAYOUT - ALL ROOMS WITHIN HOUSE
            // ==============================================
            //
            //  Back wall (positive Z = +hD/2)
            //  ┌──────────┬──────────┬──────────┐
            //  │ Bedroom1 │ Bedroom2 │ Bedroom3 │  ← back zone
            //  ├──────────┴──────────┴──────────┤  ← corridor
            //  │ Bathroom │  Kitchen  │ Living  │  ← front zone
            //  └──────────┴─────┬─────┴─────────┘
            //                  Door
            //  Front wall (negative Z = -hD/2)
            //
            const houseWidth = houseGroup.userData.houseWidth || 10;
            const houseDepth = houseGroup.userData.houseDepth || 7.5;
            const bedroomCount = parseInt(answers.Q4) || surveyState.bedrooms || 2;

            const wallT = 0.15;       // interior wall thickness
            const corridorGap = 0.4;  // corridor between zones
            const innerW = houseWidth - wallT * 2;

            // Back zone (bedrooms): positive Z half
            const backMinZ = corridorGap / 2;
            const backMaxZ = houseDepth / 2 - wallT;
            const backDepth = backMaxZ - backMinZ;
            const backCenterZ = (backMinZ + backMaxZ) / 2;

            // Front zone (service rooms): negative Z half
            const frontMinZ = -(houseDepth / 2 - wallT);
            const frontMaxZ = -corridorGap / 2;
            const frontDepth = frontMaxZ - frontMinZ;
            const frontCenterZ = (frontMinZ + frontMaxZ) / 2;

            // Bedroom dimensions
            const bedroomW = innerW / bedroomCount;

            // Service room proportions (left to right: bathroom, kitchen, living)
            // Clamp widths to ensure they fit within the house bounds
            let bathroomWidth = innerW * 0.28;
            let kitchenWidth = innerW * 0.38;
            let livingWidth = innerW * 0.34;

            // Check if total service width exceeds available space
            const totalServiceWidth = bathroomWidth + kitchenWidth + livingWidth;
            if (totalServiceWidth > innerW) {
                // Scale all service rooms proportionally to fit
                const scaleFactor = innerW / totalServiceWidth;
                bathroomWidth *= scaleFactor;
                kitchenWidth *= scaleFactor;
                livingWidth *= scaleFactor;
                console.log('   ⚠️ Room layout clamped for small house: scale factor=' + scaleFactor.toFixed(2));
            }

            // Service room X centers
            const svcStartX = -innerW / 2;
            const bathroomX = svcStartX + bathroomWidth / 2;
            const bathroomZ = frontCenterZ;
            const kitchenX = svcStartX + bathroomWidth + kitchenWidth / 2;
            const kitchenZ = frontCenterZ;
            const hallX = svcStartX + bathroomWidth + kitchenWidth + livingWidth / 2;
            const hallZ = frontCenterZ;

            // Store positions for dynamic camera updates
            window.roomPositions = {
                bathroom: { x: bathroomX, z: frontCenterZ },
                kitchen: { x: kitchenX, z: frontCenterZ },
                livinghall: { x: hallX, z: frontCenterZ },
                bedroom: { x: 0, z: backCenterZ }
            };

            // Update camera views dynamically based on room positions - FIXED CLIPPING
            const s = 0.5; // global scale factor
            const yCam = 5.5; // Higher camera for room overview (was 4)
            const pad = 6; // Increased padding to prevent clipping (was 2.5 → now 3 world units offset)

            cameraViews.bathroom = {
                pos: [(bathroomX + pad) * s, yCam, (frontCenterZ + pad) * s],  // Pull toward center
                lookAt: [bathroomX * s, 1, frontCenterZ * s]
            };
            cameraViews.kitchen = {
                pos: [(kitchenX - pad) * s, yCam, (frontCenterZ + pad) * s],  // Angle from left-front
                lookAt: [kitchenX * s, 1, frontCenterZ * s]
            };
            cameraViews.livinghall = {
                pos: [(hallX + pad) * s, yCam, (frontCenterZ + pad) * s],  // Angle from right-front
                lookAt: [hallX * s, 1, frontCenterZ * s]
            };
            cameraViews.bedroom = {
                pos: [pad * s, yCam + 1, (backCenterZ + backDepth/2 + pad) * s],
                lookAt: [0, 1, backCenterZ * s]
            };
            cameraViews.bedrooms = {
                // Position camera to the SIDE of bedrooms for better visibility (not looking down from above)
                pos: [-(pad + 2) * s, 3 * s, backCenterZ * s],  // To the left, at middle height
                lookAt: [0, 1.5, backCenterZ * s]  // Looking at center of bedroom zone
            };

            // DEBUG: Log room visibility info
            console.log('🛏️ BEDROOM CAMERA DEBUG:');
            console.log('   House dims: w=' + houseWidth.toFixed(1) + ', d=' + houseDepth.toFixed(1));
            console.log('   Back zone: centerZ=' + backCenterZ.toFixed(2) + ', depth=' + backDepth.toFixed(2));
            console.log('   Bedroom count: ' + bedroomCount);
            console.log('   Bedrooms camera pos: [' + cameraViews.bedrooms.pos.map(x => x.toFixed(2)).join(', ') + ']');
            console.log('   Bedrooms camera lookAt: [' + cameraViews.bedrooms.lookAt.map(x => x.toFixed(2)).join(', ') + ']');
            console.log('   Roof state: ' + (isExteriorPhase(currentPhase) ? 'VISIBLE (exterior)' : 'HIDDEN (cutaway)'));

            console.log('   📐 Floor plan - House:', houseWidth.toFixed(1), 'x', houseDepth.toFixed(1));
            console.log('   📍 Rooms WITHIN house: Bath x=' + bathroomX.toFixed(1) + ', Kitchen x=' + kitchenX.toFixed(1) + ', Living x=' + hallX.toFixed(1));

            // Cooling (Q7) - AC PLACED OUTSIDE HOUSE (back side)
            if (answers.Q7 && answers.Q7.includes('centralAC')) {
                console.log('   ❄️ Creating 3D Central AC Unit');
                placedObjects.centralAC = createCentralAC();
                // Place OUTSIDE house at back, directly behind the right-side bedroom
                const acTargetY = 0.5;
                const acX = houseWidthForAppliances / 2 - 2.5;  // Right side of house, far from bathroom
                const acZ = -houseDepthForAppliances / 2 - 1.5;  // Hugging back wall
                placedObjects.centralAC.position.set(acX, acTargetY + 5, acZ);  // Start 5 units above
                placedObjects.centralAC.rotation.y = 0;  // Facing forward (toward house)
                placedObjects.centralAC.scale.set(0, 0, 0);  // Start invisible
                if (!previouslyPlacedAppliances.has('centralAC')) {
                    placedObjects.centralAC.userData.animateIn = true;
                }
                placedObjects.centralAC.userData.targetY = acTargetY;
                appliancesGroup.add(placedObjects.centralAC);
                console.log('      ❄️ Central AC placed outside house at x=' + acX.toFixed(1) + ', z=' + acZ.toFixed(1));
            }

            if (answers.Q7 && answers.Q7.includes('centralCooling')) {
                console.log('   ❄️ Creating 3D Central Cooling System');
                placedObjects.centralCooling = createCentralCooling();
                // Place OUTSIDE house at back, next to AC unit behind right-side bedroom
                const coolTargetY = 0.5;
                const coolZ = -houseDepthForAppliances / 2 - 1.5;  // Hugging back wall
                const coolX = houseWidthForAppliances / 2 - 4.5; // Next to AC (moving towards center)
                placedObjects.centralCooling.position.set(coolX, coolTargetY + 5, coolZ);  // Start 5 units above
                placedObjects.centralCooling.rotation.y = 0;
                placedObjects.centralCooling.scale.set(0, 0, 0);  // Start invisible
                if (!previouslyPlacedAppliances.has('centralCooling')) {
                    placedObjects.centralCooling.userData.animateIn = true;
                }
                placedObjects.centralCooling.userData.targetY = coolTargetY;
                appliancesGroup.add(placedObjects.centralCooling);
                console.log('      🌀 Central Cooling placed outside house at z=' + coolZ.toFixed(1));
            }
